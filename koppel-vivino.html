<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vivino koppelen — Proef Griekenland</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #4273bd;
      --yellow: #ffcc00;
      --green:  #2e9e5b;
      --red:    #d94f4f;
      --gray:   #f5f5f5;
      --border: #e0e0e0;
      --text:   #222;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: #fafafa;
      padding: 24px 16px 80px;
    }

    header {
      max-width: 900px;
      margin: 0 auto 28px;
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 6px;
    }
    header p { color: #555; line-height: 1.5; }

    .stats {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .stat {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      min-width: 120px;
    }
    .stat strong { display: block; font-size: 22px; font-weight: 700; }
    .stat.green strong { color: var(--green); }
    .stat.orange strong { color: #e07b00; }

    .filters {
      max-width: 900px;
      margin: 0 auto 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: white;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      transition: all .15s;
    }
    .filter-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
    .search-input {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 13px;
      width: 200px;
      outline: none;
    }
    .search-input:focus { border-color: var(--blue); }

    .list {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      transition: border-color .15s;
    }
    .card.gekoppeld { border-left: 4px solid var(--green); }
    .card.ongekoppeld { border-left: 4px solid var(--border); }
    .card.saving { opacity: .6; pointer-events: none; }

    .card-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
    }
    .card-name a {
      color: var(--text);
      text-decoration: none;
    }
    .card-name a:hover { color: var(--blue); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .badge.green { background: #d4f5e2; color: var(--green); }
    .badge.gray  { background: var(--gray); color: #888; }

    .vivino-info {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
    }
    .vivino-info .score {
      font-weight: 700;
      color: var(--blue);
      font-size: 15px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }
    .input-row input {
      flex: 1;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .input-row input:focus { border-color: var(--blue); }
    .input-row input.error { border-color: var(--red); }
    .input-row input.success { border-color: var(--green); }

    .btn-save {
      padding: 7px 16px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-save:hover { background: #3461a8; }
    .btn-save:disabled { background: #aaa; cursor: not-allowed; }

    .btn-vivino {
      padding: 7px 12px;
      background: #aa1428;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-vivino:hover { background: #8e1020; }

    .card-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .msg {
      font-size: 12px;
      margin-top: 5px;
      min-height: 16px;
    }
    .msg.ok  { color: var(--green); }
    .msg.err { color: var(--red); }

    .loading-overlay {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 16px;
    }

    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>🍇 Vivino koppelen</h1>
  <p>Koppel elk product aan Vivino door de Vivino-URL te plakken. De sommelier toont daarna automatisch de score.</p>
  <div class="stats" id="stats">
    <div class="stat green"><strong id="stat-gekoppeld">—</strong>Gekoppeld</div>
    <div class="stat orange"><strong id="stat-open">—</strong>Nog open</div>
    <div class="stat"><strong id="stat-totaal">—</strong>Totaal</div>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" data-filter="open">Nog open</button>
  <button class="filter-btn" data-filter="gekoppeld">Gekoppeld</button>
  <button class="filter-btn" data-filter="alle">Alle</button>
  <input class="search-input" type="search" id="zoekterm" placeholder="Zoek op naam…">
</div>

<div class="list" id="lijst">
  <div class="loading-overlay">Producten laden…</div>
</div>

<script>
const PROXY = 'http://localhost:3000';
let producten = [];
let huidigFilter = 'open';

// ── Laden ──────────────────────────────────────────────────────────────────
async function laadProducten() {
  const res = await fetch(`${PROXY}/vivino-koppelen/producten`);
  producten = await res.json();
  updateStats();
  render();
}

function updateStats() {
  const gekoppeld = producten.filter(p => p.gekoppeld).length;
  document.getElementById('stat-gekoppeld').textContent = gekoppeld;
  document.getElementById('stat-open').textContent     = producten.length - gekoppeld;
  document.getElementById('stat-totaal').textContent   = producten.length;
}

// ── Renderen ──────────────────────────────────────────────────────────────
function render() {
  const zoek = document.getElementById('zoekterm').value.toLowerCase();
  const lijst = document.getElementById('lijst');

  const gefilterd = producten.filter(p => {
    const matchFilter =
      huidigFilter === 'alle'      ? true :
      huidigFilter === 'open'      ? !p.gekoppeld :
      huidigFilter === 'gekoppeld' ? p.gekoppeld  : true;
    const matchZoek = !zoek || p.name.toLowerCase().includes(zoek);
    return matchFilter && matchZoek;
  });

  if (!gefilterd.length) {
    lijst.innerHTML = '<div class="loading-overlay">Geen producten gevonden.</div>';
    return;
  }

  lijst.innerHTML = gefilterd.map(p => kaartHTML(p)).join('');
}

function kaartHTML(p) {
  const zoekNaam = encodeURIComponent(p.name.replace(/\s+\d{4}$/, ''));
  const vivinoZoek = `https://www.vivino.com/NL/nl/search/wines?q=${zoekNaam}`;

  const badge = p.gekoppeld
    ? `<span class="badge green">✓ Gekoppeld</span>`
    : `<span class="badge gray">Niet gekoppeld</span>`;

  const huidigId = p.vintageId || p.wineId || '';
  const huidigLabel = p.vintageId
    ? `Vintage-ID: ${p.vintageId}`
    : p.wineId ? `Wijn-ID: ${p.wineId}` : '';

  const vivinoInfo = huidigLabel
    ? `<div class="vivino-info">${huidigLabel}</div>`
    : '';

  return `
    <div class="card ${p.gekoppeld ? 'gekoppeld' : 'ongekoppeld'}" id="kaart-${p.id}">
      <div>
        <div class="card-name">
          <a href="${p.url}" target="_blank">${p.name}</a>
        </div>
        ${badge}
        ${vivinoInfo}
        <div class="input-row">
          <input
            type="text"
            id="input-${p.id}"
            placeholder="Plak hier de Vivino-URL of het ID…"
            value="${huidigId}"
            onkeydown="if(event.key==='Enter') slaOp(${p.id})"
          >
          <button class="btn-save" onclick="slaOp(${p.id})">Opslaan</button>
          <a class="btn-vivino" href="${vivinoZoek}" target="_blank">
            🍷 Zoek op Vivino
          </a>
        </div>
        <div class="msg" id="msg-${p.id}"></div>
        <div class="hint">Plak de URL van de Vivino-pagina, bijv.:<br>
          <code>https://www.vivino.com/NL/nl/sigalas-assyrtiko-santorini/w/1155868</code>
        </div>
      </div>
    </div>`;
}

// ── Opslaan ────────────────────────────────────────────────────────────────
async function slaOp(productId) {
  const input   = document.getElementById(`input-${productId}`);
  const msgEl   = document.getElementById(`msg-${productId}`);
  const kaart   = document.getElementById(`kaart-${productId}`);
  const waarde  = input.value.trim();

  input.classList.remove('error', 'success');
  msgEl.className = 'msg';
  msgEl.textContent = 'Opslaan…';
  kaart.classList.add('saving');

  try {
    const res = await fetch(`${PROXY}/vivino-koppelen/opslaan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ productId, vivinoInput: waarde }),
    });
    const data = await res.json();

    kaart.classList.remove('saving');

    if (!res.ok) {
      input.classList.add('error');
      msgEl.className = 'msg err';
      msgEl.textContent = data.error || 'Opslaan mislukt.';
      return;
    }

    input.classList.add('success');
    msgEl.className = 'msg ok';
    const ratingTekst = data.rating
      ? ` — Vivino-score: ${data.rating.score} (${data.rating.count} beoordelingen)`
      : '';
    msgEl.textContent = `✓ Opgeslagen!${ratingTekst}`;

    // Update lokale data en herrender
    const p = producten.find(x => x.id === productId);
    if (p) {
      p.gekoppeld  = true;
      p.vintageId  = data.vintageId;
      p.wineId     = data.wineId;
    }
    updateStats();

    // Kaart na 1.5s verbergen als filter op 'open' staat
    if (huidigFilter === 'open') {
      setTimeout(() => render(), 1500);
    }

  } catch (err) {
    kaart.classList.remove('saving');
    input.classList.add('error');
    msgEl.className = 'msg err';
    msgEl.textContent = 'Verbindingsfout met de proxy.';
  }
}

// ── Events ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    huidigFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('zoekterm').addEventListener('input', render);

// Laad bij start
laadProducten();
</script>
</body>
</html>
